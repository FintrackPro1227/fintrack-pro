<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FinRapi — Login Tim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#060f24;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 28px;width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:28px}
.logo-ico{width:54px;height:54px;background:#2563eb;border-radius:14px;display:grid;place-items:center;margin:0 auto 12px;font-size:26px}
.logo-name{font-size:22px;font-weight:900;color:#f8fafc;letter-spacing:-.3px}
.logo-sub{font-size:13px;color:#64748b;margin-top:4px}
.fg{margin-bottom:14px}
label{font-size:12.5px;font-weight:600;color:#94a3b8;margin-bottom:6px;display:block}
input{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;font-size:15px;color:#f8fafc;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus{border-color:#2563eb}
input::placeholder{color:#334155}
.btn{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn:disabled{background:#1e3a5f;color:#475569}
.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:11px 13px;border-radius:9px;font-size:13.5px;margin-top:12px;display:none;line-height:1.5}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-ico">📊</div>
    <div class="logo-name">FinRapi</div>
    <div class="logo-sub">Portal input dokumen tim</div>
  </div>
  <div class="fg">
    <label>Email</label>
    <input type="email" id="em" placeholder="email@finrapi.id" autocomplete="email" autofocus>
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" id="pw" placeholder="Masukkan password" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="login()">Masuk</button>
  <div class="err" id="err"></div>
</div>
<script>
document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });
async function login(){
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  if(!em||!pw){ showErr('Email dan password wajib diisi.'); return; }
  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div>Masuk...';
  err.style.display='none';
  try{
    const res=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:em,password:pw})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Login gagal.');
    if(!['SUPERADMIN','OPERATOR','ACCOUNTANT'].includes(data.user.role))
      throw new Error('Akses ditolak. Halaman ini hanya untuk tim FinRapi.');
    localStorage.setItem('fr_token', data.token);
    localStorage.setItem('fr_name', data.user.name);
    window.location.href='/upload-app.html';
  } catch(e){
    showErr(e.message);
    btn.disabled=false;
    btn.innerHTML='Masuk';
  }
}
function showErr(m){ const e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }
// Auto redirect if already logged in
const t=localStorage.getItem('fr_token');
if(t){
  fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+t}})
    .then(r=>r.ok?window.location.href='/upload-app.html':null)
    .catch(()=>null);
}
</script>
</body>
</html>
